<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Feedback - AI Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a> | 
        <a href="add_paper.html">Add Paper</a> | 
        <a href="add_user.html">Add User</a> | 
        <a href="add_feedback.html">Add Feedback</a>
    </nav>
    <hr>
    
    <h1>Add Feedback</h1>
    <p>Submit a paper that a user dislikes so it won't be recommended.</p>
    
    <form id="form-add-feedback" class="simple-form">
        <label>User ID:</label>
        <input type="text" id="feedback-user" required>
        
        <label>Paper ID (Disliked):</label>
        <input type="text" id="feedback-paper" required>
        
        <br>
        <button type="submit">Submit Feedback</button>
    </form>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
