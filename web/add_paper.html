<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Paper - AI Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a> | 
        <a href="add_paper.html">Add Paper</a> | 
        <a href="add_user.html">Add User</a> | 
        <a href="add_feedback.html">Add Feedback</a>
    </nav>
    <hr>
    
    <h1>Add New Paper</h1>
    
    <form id="form-add-paper" class="simple-form">
        <label>Paper ID:</label>
        <input type="text" id="paper-id" required>
        
        <label>Title:</label>
        <input type="text" id="paper-title" required>
        
        <label>Keywords (comma-separated):</label>
        <input type="text" id="paper-keywords" required>
        
        <label>Year:</label>
        <input type="number" id="paper-year" required>
        
        <label>Authors (comma-separated):</label>
        <input type="text" id="paper-authors" required>
        
        <br>
        <button type="submit">Submit Paper</button>
    </form>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
